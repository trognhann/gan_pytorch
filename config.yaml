# config.yaml (Training and Model Configurations for AnimeGANv3 PyTorch)

training:
  # General
  dataset_dir: "dataset" # Directory where datasets are stored
  epochs: 10
  init_epochs: 5          # Generator pre-train epochs
  batch_size: 8
  save_freq: 1            # Frequency (in epochs) to save checkpoints
  checkpoint_dir: "checkpoint"  # Directory where checkpoints are saved

  # Learning Rates
  init_lr: 2.0e-4         # Pre-train generator LR
  g_lr: 1.0e-4            # GAN generator LR
  d_lr: 2.0e-4            # GAN discriminator LR (2x G_lr per paper)
  adam_betas: [0.5, 0.999]

  # DDP and AMP
  use_amp: false          # Disabled to debug NaN — rules out fp16 overflow
  num_workers: 4

  # Image handling
  img_size: [256, 256]    # Training resolution [H, W]

loss_weights:
  # Support Tail
  con_weight: 0.5
  sty_weight: [0.1, 5.0, 25.0]
  color_weight: 10.0
  tv_weight: 0.001
  adv_weight: 1.0         # LSGAN D fake vs anime real weight scaling
  d_smooth_weight: 2.0
  region_smooth_weight: 0.2
  vgg_region_weight: 0.2
  
  # Main Tail
  p0_weight: 10.0           # Reduced from 50.0 — too large amplifies gradient explosion risk
  p4_weight: 0.5
  adv_weight_m: 0.02
  tv_weight_m: 0.001
  d_main_weight: 0.1
  r1_weight: 1.0           # R1 gradient penalty weight for D (reduced from 10.0 to prevent D collapse)
  d_update_ratio: 2         # Train D this many times per G step (fixes D collapse)

model:
  ch: 64                  # Base channel size for D (was 32, increased to prevent D collapse)
  sn: true                # Spectral Normalization in D
